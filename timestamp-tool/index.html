<script>
// Live timestamp
function updateLive(){
  const now=new Date();
  document.getElementById('liveTs').textContent=Math.floor(now.getTime()/1000);
  document.getElementById('liveDate').textContent=fmtFull(now,'Asia/Shanghai');
}
setInterval(updateLive,1000);
updateLive();

// Tab switching
document.querySelectorAll('.tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('tab-'+tab.dataset.tab).classList.add('active');
  });
});

// Format helpers
function fmtFull(d,tz){
  try{return d.toLocaleString('zh-CN',{timeZone:tz,year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});}
  catch(e){return d.toLocaleString('zh-CN',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});}
}
function fmtISO(d,tz){
  try{return d.toLocaleString('sv-SE',{timeZone:tz,year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false}).replace(' ','T');}
  catch(e){return d.toISOString();}
}
function fmtRFC(d,tz){
  try{return d.toLocaleString('en-US',{timeZone:tz,dateStyle:'full',timeStyle:'long'});}
  catch(e){return d.toUTCString();}
}
function fmtCustom(d,tz){
  return fmtISO(d,tz).replace('T',' ') + ' ' + tz;
}
function toLocal(d){
  const pad=n=>String(n).padStart(2,'0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
}

// Timestamp to Date
function convertTs2Date(){
  let ts=document.getElementById('tsInput').value.trim();
  if(!ts){showToast('请输入时间戳','error');return;}
  ts=Number(ts);
  if(isNaN(ts)){showToast('无效的时间戳','error');return;}
  // Auto-detect seconds vs milliseconds
  if(ts<1e12)ts*=1000;
  const d=new Date(ts);
  if(isNaN(d.getTime())){showToast('无效的时间戳','error');return;}
  const tz=document.getElementById('ts2dateTz').value;
  const outputs=[
    ['日期时间',fmtFull(d,tz)],
    ['ISO 8601',fmtISO(d,tz)],
    ['RFC 2822',fmtRFC(d,tz)],
    ['自定义格式',fmtCustom(d,tz)],
    ['Unix 秒',Math.floor(d.getTime()/1000)],
    ['Unix 毫秒',d.getTime()],
    ['UTC 时间',d.toUTCString()],
    ['本地时间',d.toLocaleString('zh-CN')],
  ];
  document.getElementById('ts2dateOutputs').innerHTML=outputs.map(([l,v])=>
    `<div class="output-item"><div class="label">${l}</div><div class="value">${esc(String(v))}</div><button class="copy-btn" onclick="copyText('${esc(String(v)).replace(/'/g,"\\'")}')">复制</button></div>`
  ).join('');
  document.getElementById('ts2dateResult').style.display='block';
}

// Date to Timestamp
function convertDate2Ts(){
  const v=document.getElementById('dateInput').value;
  if(!v){showToast('请选择日期时间','error');return;}
  const d=new Date(v);
  if(isNaN(d.getTime())){showToast('无效的日期','error');return;}
  const tz=document.getElementById('date2tsTz').value;
  const outputs=[
    ['Unix 秒',Math.floor(d.getTime()/1000)],
    ['Unix 毫秒',d.getTime()],
    ['UTC 时间',d.toUTCString()],
    ['ISO 8601',d.toISOString()],
    [tz+' 时间',fmtFull(d,tz)],
    ['本地时间',d.toLocaleString('zh-CN')],
  ];
  document.getElementById('date2tsOutputs').innerHTML=outputs.map(([l,v])=>
    `<div class="output-item"><div class="label">${l}</div><div class="value">${esc(String(v))}</div><button class="copy-btn" onclick="copyText('${esc(String(v)).replace(/'/g,"\\'")}')">复制</button></div>`
  ).join('');
  document.getElementById('date2tsResult').style.display='block';
}

// Quick date buttons
function setQuickDate(type){
  const now=new Date();
  let d;
  switch(type){
    case 'now':d=now;break;
    case '1h':d=new Date(now.getTime()-3600000);break;
    case 'today':d=new Date(now.getFullYear(),now.getMonth(),now.getDate());break;
    case 'monday':{const day=now.getDay()||7;d=new Date(now.getFullYear(),now.getMonth(),now.getDate()-day+1);break;}
    case 'month1':d=new Date(now.getFullYear(),now.getMonth(),1);break;
  }
  document.getElementById('dateInput').value=toLocal(d);
}

// Date difference
function calcDiff(){
  const s=new Date(document.getElementById('diffStart').value);
  const e=new Date(document.getElementById('diffEnd').value);
  if(isNaN(s)||isNaN(e)){showToast('请选择有效的日期','error');return;}
  let diff=Math.abs(e.getTime()-s.getTime());
  const days=Math.floor(diff/86400000);diff%=86400000;
  const hours=Math.floor(diff/3600000);diff%=3600000;
  const mins=Math.floor(diff/60000);diff%=60000;
  const secs=Math.floor(diff/1000);
  const totalSecs=Math.floor(Math.abs(e.getTime()-s.getTime())/1000);
  const totalMins=Math.floor(totalSecs/60);
  const totalHours=Math.floor(totalSecs/3600);
  const totalDays=Math.floor(totalSecs/86400);
  const items=[
    ['天',days],['小时',hours],['分钟',mins],['秒',secs],
    ['总计天数',totalDays],['总计小时',totalHours],['总计分钟',totalMins],['总计秒数',totalSecs],
  ];
  document.getElementById('diffOutputs').innerHTML=items.map(([l,v])=>
    `<div class="diff-item"><span class="diff-label">${l}</span><span class="diff-value">${v}</span></div>`
  ).join('');
  document.getElementById('diffResult').style.display='block';
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function copyText(text){
  navigator.clipboard.writeText(text).then(()=>showToast('已复制到剪贴板'));
}

function showToast(msg,type){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.style.background=type==='error'?'var(--error)':'var(--success)';
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

// Init date inputs
document.getElementById('dateInput').value=toLocal(new Date());
document.getElementById('diffStart').value=toLocal(new Date());
document.getElementById('diffEnd').value=toLocal(new Date());
</script>
