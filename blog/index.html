    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);min-height:100vh;color:#fff;padding:0}

        /* Nav */
        .nav{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.5rem;max-width:1200px;margin:0 auto}
        .nav-brand{display:flex;align-items:center;gap:10px;text-decoration:none;color:#fff}
        .nav-brand .logo{font-size:1.4rem;font-weight:700;background:linear-gradient(90deg,#00d2ff,#3a7bd5);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        .nav-brand .sep{color:#444;margin:0 4px}
        .nav-brand .blog-label{font-size:1rem;color:#aaa;font-weight:400}
        .nav-back{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;border-radius:10px;border:1px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.04);color:#aaa;font-size:0.85rem;text-decoration:none;transition:all .3s}
        .nav-back:hover{border-color:#3a7bd5;color:#fff;background:rgba(58,123,213,0.1)}

        /* Hero */
        .hero{text-align:center;padding:2.5rem 1.5rem 1.5rem;max-width:800px;margin:0 auto}
        .hero h1{font-size:clamp(1.8rem,4vw,2.8rem);margin-bottom:0.5rem;background:linear-gradient(90deg,#00d2ff,#3a7bd5);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        .hero p{color:#999;font-size:clamp(0.9rem,2vw,1.1rem);line-height:1.6}

        /* Posts Grid */
        .posts{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1.2rem;max-width:1200px;margin:0 auto;padding:1.5rem 1.5rem 3rem}

        /* Card */
        .post-card{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:1.5rem;text-decoration:none;color:#fff;transition:all .3s;backdrop-filter:blur(10px);display:flex;flex-direction:column}
        .post-card:hover{transform:translateY(-3px);border-color:rgba(58,123,213,0.5);box-shadow:0 8px 28px rgba(58,123,213,0.2)}
        .post-card .tag{display:inline-block;font-size:0.7rem;padding:3px 10px;border-radius:8px;margin-bottom:10px;font-weight:600;width:fit-content}
        .tag-ai{background:linear-gradient(90deg,#00d2ff,#3a7bd5);color:#fff}
        .tag-tool{background:#10b981;color:#fff}
        .tag-guide{background:#f59e0b;color:#fff}
        .post-card h2{font-size:1.05rem;line-height:1.4;margin-bottom:8px}
        .post-card p{color:#999;font-size:0.82rem;line-height:1.5;flex:1}
        .post-card .meta{display:flex;align-items:center;gap:12px;margin-top:12px;font-size:0.75rem;color:#666}
        .post-card .meta .date{display:flex;align-items:center;gap:4px}

        /* Empty State */
        .empty-state{text-align:center;padding:4rem 1.5rem;grid-column:1/-1}
        .empty-state .icon{font-size:3rem;margin-bottom:1rem;opacity:0.3}
        .empty-state h2{font-size:1.2rem;color:#888;margin-bottom:0.5rem}
        .empty-state p{color:#666;font-size:0.9rem;line-height:1.6}
        .empty-state code{background:rgba(255,255,255,0.08);padding:2px 8px;border-radius:4px;font-size:0.85rem;color:#aaa}

        /* Footer */
        footer{text-align:center;padding:2rem 1.5rem;color:#555;font-size:0.8rem;border-top:1px solid rgba(255,255,255,0.05)}
        footer a{color:#666;text-decoration:none}
        footer a:hover{color:#3a7bd5}
        .footer-links{display:flex;gap:1.5rem;justify-content:center;margin-bottom:0.8rem;flex-wrap:wrap}

        @media(max-width:640px){
            .posts{grid-template-columns:1fr}
            .nav{flex-direction:column;gap:12px}
        }
    </style>
