                    { day: 27, title: 'RapidAPI 上架', revenue: 1900, tasks: [
                        { id: 't27_1', text: '完善 API 文档' },
                        { id: 't27_2', text: '提交 RapidAPI 审核' },
                        { id: 't27_3', text: '设置 API 定价' },
                        { id: 't27_4', text: '准备 API 示例代码' }
                    ], tip: '💡 RapidAPI 是 API 产品的天然分发渠道。', resources: ['rapidapi.com'] },
                    { day: 28, title: '付费广告测试', revenue: 2100, tasks: [
                        { id: 't28_1', text: '设置 Google Ads 小预算测试（¥100/天）' },
                        { id: 't28_2', text: '设置百度推广测试' },
                        { id: 't28_3', text: '追踪广告 ROI' },
                        { id: 't28_4', text: '暂停 ROI < 1 的广告组' }
                    ], tip: '💡 先小预算测试，找到盈利模型再放大。' },
                    { day: 29, title: '规模化复制', revenue: 2400, tasks: [
                        { id: 't29_1', text: '加大盈利渠道的投入' },
                        { id: 't29_2', text: '复制成功内容模板' },
                        { id: 't29_3', text: '拓展新的流量渠道' },
                        { id: 't29_4', text: '开始规划下一个产品' }
                    ], tip: '💡 验证过的模式要快速复制，不要一直试新方法。' },
                    { day: 30, title: '月度复盘 & 下月计划 🎊', revenue: 2800, tasks: [
                        { id: 't30_1', text: '汇总30天所有数据' },
                        { id: 't30_2', text: '计算 MRR 和增长率' },
                        { id: 't30_3', text: '总结3个最大收获和3个最大教训' },
                        { id: 't30_4', text: '制定下月增长目标' }
                    ], tip: '💡 恭喜完成30天冷启动！这只是开始，持续迭代才是关键。' }
                ]
            }
        ];

        // Build UI
        function buildUI() {
            const container = document.getElementById('phasesContainer');
            container.innerHTML = '';
            let totalTasks = 0;
            planData.forEach(phase => {
                phase.days.forEach(day => { totalTasks += day.tasks.length; });
            });
            document.getElementById('totalCount').textContent = totalTasks;

            planData.forEach(phase => {
                const phaseEl = document.createElement('div');
                phaseEl.className = 'phase';
                const phaseTasks = phase.days.reduce((s, d) => s + d.tasks.length, 0);
                const phaseCompleted = phase.days.reduce((s, d) => s + d.tasks.filter(t => isChecked(t.id)).length, 0);
                const phasePct = phaseTasks ? Math.round((phaseCompleted / phaseTasks) * 100) : 0;

                phaseEl.innerHTML = `
                    <div class="phase-header" onclick="togglePhase(this)">
                        <span class="phase-icon">${phase.icon}</span>
                        <div class="phase-info">
                            <h2>${phase.title}</h2>
                            <p>${phase.subtitle}</p>
                        </div>
                        <div class="phase-progress">
                            <div class="pct">${phasePct}%</div>
                            <div class="detail">${phaseCompleted}/${phaseTasks}</div>
                        </div>
                        <span class="phase-toggle">▼</span>
                    </div>
                    <div class="day-list">
                        ${phase.days.map(day => buildDayCard(day)).join('')}
                    </div>
                `;
                container.appendChild(phaseEl);
            });
            updateOverallProgress();
        }

        function buildDayCard(day) {
            const allChecked = day.tasks.every(t => isChecked(t.id));
            const completedTasks = day.tasks.filter(t => isChecked(t.id)).length;
            return `
                <div class="day-card ${allChecked ? 'completed' : ''}" id="day-${day.day}">
                    <div class="day-header" onclick="toggleDay(this)">
                        <span class="day-number">Day ${day.day}</span>
                        <span class="day-title">${day.title}</span>
                        <span class="day-revenue">~¥${day.revenue}</span>
                        <span class="day-toggle">▼</span>
                    </div>
                    <div class="day-tasks">
                        ${day.tasks.map(t => `
                            <div class="task-item">
                                <input type="checkbox" id="${t.id}" ${isChecked(t.id) ? 'checked' : ''} onchange="onTaskChange()">
                                <label for="${t.id}">${t.text}</label>
                            </div>
                        `).join('')}
                        ${day.tip ? `<div class="tip-box"><p><span class="tip-label">提示：</span>${day.tip}</p></div>` : ''}
                        ${day.resources ? `<div style="margin-top:8px;">${day.resources.map(r => `<a class="resource-link" href="https://${r}" target="_blank">🔗 ${r}</a>`).join('')}</div>` : ''}
                    </div>
                </div>
            `;
        }

        function isChecked(id) {
            return localStorage.getItem('launchplan_' + id) === 'true';
        }

        function onTaskChange() {
            document.querySelectorAll('.task-item input[type="checkbox"]').forEach(cb => {
                localStorage.setItem('launchplan_' + cb.id, cb.checked);
            });
            buildUI();
        }

        function togglePhase(el) {
            el.closest('.phase').classList.toggle('collapsed');
        }

        function toggleDay(el) {
            el.closest('.day-card').classList.toggle('collapsed');
        }

        function updateOverallProgress() {
            let total = 0, completed = 0, revenue = 0, daysDone = 0;
            planData.forEach(phase => {
                phase.days.forEach(day => {
                    day.tasks.forEach(t => {
                        total++;
                        if (isChecked(t.id)) completed++;
                    });
                    const dayComplete = day.tasks.every(t => isChecked(t.id));
                    if (dayComplete) { daysDone++; revenue = Math.max(revenue, day.revenue); }
                });
            });
            // Calculate revenue based on last completed day
            let maxRevenue = 0;
            planData.forEach(phase => {
                phase.days.forEach(day => {
                    const dayComplete = day.tasks.every(t => isChecked(t.id));
                    if (dayComplete && day.revenue > maxRevenue) maxRevenue = day.revenue;
                });
            });
            const pct = total ? Math.round((completed / total) * 100) : 0;
            document.getElementById('overallFill').style.width = pct + '%';
            document.getElementById('completedCount').textContent = completed;
            document.getElementById('totalCount').textContent = total;
            document.getElementById('dayCount').textContent = daysDone;
            document.getElementById('revenueAmount').textContent = '¥' + maxRevenue.toLocaleString();
        }

        buildUI();
    </script>
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('../sw.js').catch(()=>{})}</script>
</body>
