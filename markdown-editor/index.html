<script>
const editor=document.getElementById('editor');
const preview=document.getElementById('preview');
const toastEl=document.getElementById('toast');

// Simple Markdown Parser
function parseMD(md){
let html=md;

// Escape HTML (but preserve intentional tags later)
html=html.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

// Code blocks (must be before other rules)
html=html.replace(/```(\w*)\n([\s\S]*?)```/g,(m,lang,code)=>{
return `<pre><code class="language-${lang}">${code.trim()}</code></pre>`;
});

// Inline code
html=html.replace(/`([^`]+)`/g,'<code>$1</code>');

// Headings
html=html.replace(/^#### (.+)$/gm,'<h4>$1</h4>');
html=html.replace(/^### (.+)$/gm,'<h3>$1</h3>');
html=html.replace(/^## (.+)$/gm,'<h2>$1</h2>');
html=html.replace(/^# (.+)$/gm,'<h1>$1</h1>');

// Horizontal rule
html=html.replace(/^---+$/gm,'<hr>');

// Task lists (before other list processing)
html=html.replace(/^- \[x\] (.+)$/gm,'<li><input type="checkbox" checked disabled>$1</li>');
html=html.replace(/^- \[ \] (.+)$/gm,'<li><input type="checkbox" disabled>$1</li>');

// Blockquote
html=html.replace(/^&gt; (.+)$/gm,'<blockquote><p>$1</p></blockquote>');

// Bold + Italic
html=html.replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>');
html=html.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
html=html.replace(/\*(.+?)\*/g,'<em>$1</em>');
html=html.replace(/~~(.+?)~~/g,'<s>$1</s>');

// Images (before links)
html=html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g,'<img src="$2" alt="$1">');

// Links
html=html.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank">$1</a>');

// Tables
html=html.replace(/^(\|.+\|)\n(\|[-| :]+\|)\n((?:\|.+\|\n?)*)/gm,(m,header,sep,body)=>{
const headers=header.split('|').filter(c=>c.trim()).map(c=>`<th>${c.trim()}</th>`).join('');
const rows=body.trim().split('\n').map(row=>{
const cells=row.split('|').filter(c=>c.trim()).map(c=>`<td>${c.trim()}</td>`).join('');
return `<tr>${cells}</tr>`;
}).join('');
return `<table><thead><tr>${headers}</tr></thead><tbody>${rows}</tbody></table>`;
});

// Unordered lists
html=html.replace(/((?:^- .+\n?)+)/gm,(m)=>{
const items=m.trim().split('\n').map(l=>`<li>${l.replace(/^- /,'')}</li>`).join('');
return `<ul>${items}</ul>`;
});

// Ordered lists
html=html.replace(/((?:^\d+\. .+\n?)+)/gm,(m)=>{
const items=m.trim().split('\n').map(l=>`<li>${l.replace(/^\d+\. /,'')}</li>`).join('');
return `<ol>${items}</ol>`;
});

// Paragraphs - wrap remaining loose text
html=html.replace(/\n{2,}/g,'</p><p>');
// Clean up empty paragraphs around block elements
html=html.replace(/<p>\s*(<h[1-6]|<pre|<ul|<ol|<blockquote|<hr|<table)/g,'$1');
html=html.replace(/(<\/h[1-6]>|<\/pre>|<\/ul>|<\/ol>|<\/blockquote>|<hr>|<\/table>)\s*<\/p>/g,'$1');

if(!html.startsWith('<'))html='<p>'+html+'</p>';

return html;
}

function updatePreview(){
preview.innerHTML=parseMD(editor.value);
}

function insertSyntax(type){
const start=editor.selectionStart;
const end=editor.selectionEnd;
const text=editor.value;
const selected=text.substring(start,end);
let insert='',cursorOffset=0;

switch(type){
case'heading':insert=`## ${selected||'标题'}`;cursorOffset=selected?0:3;break;
case'bold':insert=`**${selected||'粗体文本'}**`;cursorOffset=selected?0:2;break;
case'italic':insert=`*${selected||'斜体文本'}*`;cursorOffset=selected?0:1;break;
case'strikethrough':insert=`~~${selected||'删除文本'}~~`;cursorOffset=selected?0:2;break;
case'link':insert=`[${selected||'链接文本'}](https://)`;cursorOffset=selected?0:1;break;
case'image':insert=`![${selected||'图片描述'}](https://)`;cursorOffset=selected?0:2;break;
case'code':insert=`\`${selected||'代码'}\``;cursorOffset=selected?0:1;break;
case'codeblock':insert=`\`\`\`\n${selected||'代码内容'}\n\`\`\``;cursorOffset=selected?0:4;break;
case'ul':insert=`- ${selected||'列表项'}`;cursorOffset=selected?0:2;break;
case'ol':insert=`1. ${selected||'列表项'}`;cursorOffset=selected?0:3;break;
case'task':insert=`- [ ] ${selected||'任务项'}`;cursorOffset=selected?0:6;break;
case'quote':insert=`> ${selected||'引用内容'}`;cursorOffset=selected?0:2;break;
case'table':insert=`| 列1 | 列2 | 列3 |\n|------|------|------|\n| 内容 | 内容 | 内容 |`;cursorOffset=0;break;
case'hr':insert=`---`;cursorOffset=0;break;
}

editor.value=text.substring(0,start)+insert+text.substring(end);
editor.focus();
const newPos=start+insert.length-cursorOffset;
editor.setSelectionRange(newPos,newPos);
updatePreview();
}

function copyMarkdown(){
navigator.clipboard.writeText(editor.value).then(()=>showToast('已复制Markdown！'));
}

function exportHTML(){
const content=`<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Markdown Export</title><style>body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;max-width:800px;margin:40px auto;padding:0 20px;color:#24292f;line-height:1.7}h1{border-bottom:1px solid #d0d7de;padding-bottom:.3em}h2{border-bottom:1px solid #d0d7de;padding-bottom:.3em}code{background:#eff1f3;padding:2px 6px;border-radius:4px;font-size:.9em}pre{background:#161b22;color:#e6edf3;padding:16px;border-radius:8px;overflow-x:auto}pre code{background:none;padding:0;color:inherit}blockquote{border-left:4px solid #d0d7de;padding:0 1em;color:#656d76}table{border-collapse:collapse;width:100%}th,td{border:1px solid #d0d7de;padding:8px 12px;text-align:left}th{background:#f6f8fa}img{max-width:100%}hr{border:none;border-top:1px solid #d0d7de}</style></head><body>${parseMD(editor.value)}</body></html>`;
const blob=new Blob([content],{type:'text/html'});
const url=URL.createObjectURL(blob);
const a=document.createElement('a');
a.href=url;a.download='markdown-export.html';
a.click();
URL.revokeObjectURL(url);
showToast('HTML文件已导出！');
}

function showToast(msg){toastEl.textContent=msg;toastEl.classList.add('show');setTimeout(()=>toastEl.classList.remove('show'),2000)}

// Tab key support
editor.addEventListener('keydown',e=>{
if(e.key==='Tab'){
e.preventDefault();
const start=editor.selectionStart;
const end=editor.selectionEnd;
editor.value=editor.value.substring(0,start)+'  '+editor.value.substring(end);
editor.selectionStart=editor.selectionEnd=start+2;
updatePreview();
}
});

editor.addEventListener('input',updatePreview);
updatePreview();
</script>
