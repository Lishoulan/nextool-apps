<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0f;--bg2:#12121a;--bg3:#1a1a2e;--border:#2a2a3e;
  --text:#e0e0e8;--text2:#8888a0;--accent:#6c5ce7;--accent2:#a855f7;

body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}

header{text-align:center;padding:30px 20px 10px}

header p{color:var(--text2);margin-top:6px;font-size:.95em}
.badge{display:inline-block;margin-top:10px;padding:5px 16px;border-radius:20px;font-size:.8em;font-weight:600;background:linear-gradient(135deg,rgba(16,185,129,.2),rgba(16,185,129,.1));border:1px solid rgba(16,185,129,.4);color:var(--green)}
.container{max-width:800px;margin:0 auto;padding:0 20px 40px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:20px;backdrop-filter:blur(10px)}
.card h2{font-size:1.1em;margin-bottom:16px;display:flex;align-items:center;gap:8px;color:var(--text)}
.form-group{margin-bottom:18px}
.form-group label{display:block;color:var(--text2);margin-bottom:6px;font-size:.88em;font-weight:500}
.slider-wrap{display:flex;align-items:center;gap:14px}
.slider-wrap input[type="range"]{flex:1;-webkit-appearance:none;appearance:none;height:6px;background:var(--border);border-radius:3px;outline:none}
.slider-wrap input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));cursor:pointer;box-shadow:0 0 8px rgba(108,92,231,.5)}
.slider-wrap input[type="range"]::-moz-range-thumb{width:20px;height:20px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));cursor:pointer;border:none}
.slider-val{min-width:44px;text-align:center;font-weight:700;font-size:1.1em;color:var(--accent2)}
.toggle-row{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:14px}
.toggle-item{display:flex;align-items:center;gap:8px;padding:8px 14px;background:var(--bg);border:1px solid var(--border);border-radius:8px;cursor:pointer;transition:all .2s;user-select:none;font-size:.9em}
.toggle-item:hover{border-color:var(--accent)}
.toggle-item.active{border-color:var(--accent);background:rgba(108,92,231,.12)}
.toggle-item input[type="checkbox"]{display:none}
.toggle-dot{width:18px;height:18px;border-radius:4px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;transition:all .2s;font-size:.7em;color:transparent}
.toggle-item.active .toggle-dot{border-color:var(--accent);background:var(--accent);color:#fff}
.checkbox-row{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg);border:1px solid var(--border);border-radius:8px;cursor:pointer;transition:all .2s;user-select:none;font-size:.9em}
.checkbox-row:hover{border-color:var(--accent)}
.checkbox-row input[type="checkbox"]{accent-color:var(--accent);width:16px;height:16px}
.btn{padding:10px 20px;border:none;border-radius:8px;font-size:.95em;cursor:pointer;transition:all .2s;font-weight:600;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
.btn-primary:hover{opacity:.9;transform:translateY(-1px)}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-outline:hover{border-color:var(--accent)}
.btn-sm{padding:7px 14px;font-size:.85em}
.btn-block{width:100%;justify-content:center}
.password-display{position:relative;margin-bottom:16px}
.password-output{width:100%;padding:16px 50px 16px 16px;background:var(--bg);border:1px solid var(--border);border-radius:10px;color:var(--accent2);font-family:'Consolas','Monaco','Courier New',monospace;font-size:1.15em;letter-spacing:1px;word-break:break-all;min-height:56px;display:flex;align-items:center}
.copy-btn{position:absolute;top:50%;right:10px;transform:translateY(-50%);background:var(--border);border:none;color:var(--text);padding:8px 12px;border-radius:6px;cursor:pointer;font-size:.85em;transition:all .2s}
.copy-btn:hover{background:var(--accent);color:#fff}
.strength-meter{margin-bottom:16px}
.strength-bar-bg{height:8px;background:var(--bg);border-radius:4px;overflow:hidden;margin-top:6px}
.strength-bar{height:100%;border-radius:4px;transition:width .4s ease,background .4s ease;width:0}
.strength-label{display:flex;justify-content:space-between;align-items:center;margin-top:6px;font-size:.85em}
.strength-text{font-weight:600}
.entropy-display{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--bg);border:1px solid var(--border);border-radius:8px;font-size:.88em;color:var(--text2)}
.entropy-value{font-weight:700;color:var(--accent2);font-size:1em}
.batch-results{display:flex;flex-direction:column;gap:8px;margin-top:16px}
.batch-item{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--bg);border:1px solid var(--border);border-radius:8px}
.batch-item .pwd{flex:1;font-family:'Consolas','Monaco','Courier New',monospace;font-size:.9em;color:var(--accent2);word-break:break-all;letter-spacing:.5px}
.batch-item .copy-sm{background:none;border:1px solid var(--border);color:var(--text2);padding:4px 10px;border-radius:6px;cursor:pointer;font-size:.78em;transition:all .2s;white-space:nowrap}
.batch-item .copy-sm:hover{border-color:var(--accent);color:var(--accent)}
.tabs{display:flex;gap:4px;margin-bottom:20px}
.tab{padding:8px 20px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;cursor:pointer;color:var(--text2);font-size:.9em;transition:all .2s}
.tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.tab:hover:not(.active){border-color:var(--accent)}
.tab-content{display:none}
.tab-content.active{display:block}
.toast{position:fixed;top:20px;right:20px;background:var(--green);color:#fff;padding:12px 20px;border-radius:8px;font-size:.9em;transform:translateX(120%);transition:transform .3s;z-index:999}
.toast.show{transform:translateX(0)}
footer{text-align:center;padding:20px;color:var(--text2);border-top:1px solid var(--border);font-size:.85em}
footer a{color:var(--accent2);text-decoration:none}
footer a:hover{text-decoration:underline}
@media(max-width:600px){
  header h1{font-size:1.4em}
  .card{padding:16px}
  .toggle-row{gap:6px}
  .toggle-item{padding:6px 10px;font-size:.82em}
  .password-output{font-size:.95em;padding:12px 44px 12px 12px}
  .slider-wrap input[type="range"]{min-width:0}
}

<header>
  <h1>🔐 免费密码生成器</h1>

  <div class="tabs">

  <div class="tab-content active" id="tab-single">
    <div class="card">
      <div class="form-group">
        <label>密码长度：<span id="lengthVal" class="slider-val" style="display:inline">16</span></label>
        <div class="slider-wrap">

        <div class="slider-wrap">
          <input type="range" id="batchLengthSlider" min="8" max="128" value="16" oninput="updateBatchLength()">

      <div class="form-group">
        <label>字符类型</label>
        <div class="toggle-row">
          <div class="toggle-item active" onclick="toggleChar(this)" data-type="upper">

        </label>
      </div>
      <button class="btn btn-primary btn-block" onclick="generateBatch()">🎲 批量生成 5 个密码</button>

<script>
// 初始化 GA 页面跟踪
if (window.NextToolAnalytics) {
  window.NextToolAnalytics.initPageTracking('password-generator');
}

const CHARS = {
  upper: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
  lower: 'abcdefghijklmnopqrstuvwxyz',
  numbers: '0123456789',
  symbols: '!@#$%^&*()_+-=[]{}|;:,.<>?'
};
const AMBIGUOUS = '0Oo1lI';

function getCharPool(excludeAmbiguous) {
  const toggles = document.querySelectorAll('.tab-content.active .toggle-item');
  let pool = '';
  toggles.forEach(t => {
    if (t.classList.contains('active')) {
      pool += CHARS[t.dataset.type];
    }
  });
  if (excludeAmbiguous && pool.length > 0) {
    pool = pool.split('').filter(c => !AMBIGUOUS.includes(c)).join('');
  }
  return pool;
}

function getActiveTypes() {
  const toggles = document.querySelectorAll('.tab-content.active .toggle-item');
  let count = 0;
  toggles.forEach(t => { if (t.classList.contains('active')) count++; });
  return count;
}

function secureRandom(max) {
  const arr = new Uint32Array(1);
  crypto.getRandomValues(arr);
  return arr[0] % max;
}

function generatePassword(length, pool) {
  if (!pool || pool.length === 0) return '';
  let pwd = '';
  for (let i = 0; i < length; i++) {
    pwd += pool[secureRandom(pool.length)];
  }
  return pwd;
}

function calcEntropy(length, poolSize) {
  if (poolSize <= 0 || length <= 0) return 0;
  return Math.floor(length * Math.log2(poolSize));
}

function getStrength(entropy) {
  if (entropy < 40) return { label: '弱', color: 'var(--red)', pct: 15 };
  if (entropy < 60) return { label: '中等', color: 'var(--orange)', pct: 40 };
  if (entropy < 80) return { label: '强', color: 'var(--blue)', pct: 70 };
  return { label: '非常强', color: 'var(--green)', pct: 100 };
}

function updateLength() {
  document.getElementById('lengthVal').textContent = document.getElementById('lengthSlider').value;
}

function updateBatchLength() {
  document.getElementById('batchLengthVal').textContent = document.getElementById('batchLengthSlider').value;
}

function toggleChar(el) {
  el.classList.toggle('active');
  const cb = el.querySelector('input[type="checkbox"]');
  cb.checked = el.classList.contains('active');
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
}

function generateSingle() {
  const length = parseInt(document.getElementById('lengthSlider').value);
  const excludeAmbiguous = document.getElementById('excludeAmbiguous').checked;
  const pool = getCharPool(excludeAmbiguous);

  if (!pool) {
    showToast('请至少选择一种字符类型', 'error');
    return;
  }

  const password = generatePassword(length, pool);
  const entropy = calcEntropy(length, pool.length);
  const strength = getStrength(entropy);

  document.getElementById('passwordOutput').textContent = password;
  document.getElementById('resultCard').style.display = 'block';

  const bar = document.getElementById('strengthBar');
  bar.style.width = strength.pct + '%';
  bar.style.background = strength.color;

  const stText = document.getElementById('strengthText');
  stText.textContent = strength.label;
  stText.style.color = strength.color;

  document.getElementById('entropyValue').textContent = entropy + ' bits（字符池 ' + pool.length + ' 种）';
}

function generateBatch() {
  const length = parseInt(document.getElementById('batchLengthSlider').value);
  const excludeAmbiguous = document.getElementById('batchExcludeAmbiguous').checked;
  const pool = getCharPool(excludeAmbiguous);

  if (!pool) {
    showToast('请至少选择一种字符类型', 'error');
    return;
  }

  const container = document.getElementById('batchResults');
  container.innerHTML = '';

  for (let i = 0; i < 5; i++) {
    const password = generatePassword(length, pool);
    const item = document.createElement('div');
    item.className = 'batch-item';
    item.innerHTML = '<span class="pwd"></span><button class="copy-sm" onclick="copyBatchItem(this)">📋 复制</button>';
    item.querySelector('.pwd').textContent = password;
    container.appendChild(item);
  }
  showToast('已生成 5 个密码');
}

function copyPassword() {
  const pwd = document.getElementById('passwordOutput').textContent;
  if (!pwd) return;
  navigator.clipboard.writeText(pwd).then(() => showToast('已复制到剪贴板'));
}

function copyBatchItem(btn) {
  const pwd = btn.parentElement.querySelector('.pwd').textContent;
  navigator.clipboard.writeText(pwd).then(() => {
    btn.textContent = '✅ 已复制';
    setTimeout(() => { btn.textContent = '📋 复制'; }, 1500);
  });
}

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = type === 'error' ? 'var(--red)' : 'var(--green)';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// 页面加载自动生成一次
window.addEventListener('DOMContentLoaded', () => {
  generateSingle();
});
</script>
