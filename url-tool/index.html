.btn-sm{padding:7px 14px;font-size:.8rem}

.copy-btn{position:absolute;top:8px;right:8px;background:var(--border);border:none;color:var(--text);padding:6px 12px;border-radius:6px;cursor:pointer;font-size:.8rem;transition:all .2s}

.param-table th{text-align:left;padding:8px 10px;background:var(--bg);color:var(--text2);font-size:.8rem;font-weight:500}

footer{text-align:center;padding:30px 0;color:var(--text2);font-size:.8rem}

<script>
let parsedUrl=null;
let params=[];

document.querySelectorAll('.tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('tab-'+tab.dataset.tab).classList.add('active');
  });
});

function encodeComponent(){
  const v=document.getElementById('inputUrl').value;
  if(!v){showToast('请输入内容','error');return;}
  document.getElementById('outputUrl').value=encodeURIComponent(v);
}
function decodeComponent(){
  const v=document.getElementById('inputUrl').value;
  if(!v){showToast('请输入内容','error');return;}
  try{document.getElementById('outputUrl').value=decodeURIComponent(v);}
  catch(e){showToast('解码失败: '+e.message,'error');}
}
function encodeFull(){
  const v=document.getElementById('inputUrl').value;
  if(!v){showToast('请输入内容','error');return;}
  document.getElementById('outputUrl').value=encodeURI(v);
}
function decodeFull(){
  const v=document.getElementById('inputUrl').value;
  if(!v){showToast('请输入内容','error');return;}
  try{document.getElementById('outputUrl').value=decodeURI(v);}
  catch(e){showToast('解码失败: '+e.message,'error');}
}
function swapUrl(){
  const a=document.getElementById('inputUrl');
  const b=document.getElementById('outputUrl');
  const tmp=a.value;a.value=b.value;b.value=tmp;
}
function clearUrl(){
  document.getElementById('inputUrl').value='';
  document.getElementById('outputUrl').value='';
}

function parseUrl(){
  const raw=document.getElementById('parseInput').value.trim();
  if(!raw){showToast('请输入URL','error');return;}
  try{
    parsedUrl=new URL(raw);
    const parts=document.getElementById('urlParts');
    const items=[
      ['协议 (protocol)',parsedUrl.protocol],
      ['主机 (host)',parsedUrl.host],
      ['主机名 (hostname)',parsedUrl.hostname],
      ['端口 (port)',parsedUrl.port||'默认'],
      ['路径 (pathname)',parsedUrl.pathname],
      ['搜索 (search)',parsedUrl.search],
      ['哈希 (hash)',parsedUrl.hash],
      ['来源 (origin)',parsedUrl.origin],
    ];
    parts.innerHTML=items.map(([k,v])=>`<div class="url-part"><span class="key">${k}</span><span class="val">${esc(v)}</span></div>`).join('');
    document.getElementById('parseResult').style.display='block';

    // Parse params
    params=[];
    parsedUrl.searchParams.forEach((v,k)=>params.push({key:k,value:v}));
    renderParams();
    document.getElementById('paramSection').style.display='block';
  }catch(e){showToast('URL 格式无效: '+e.message,'error');}
}

function renderParams(){
  const body=document.getElementById('paramBody');
  body.innerHTML=params.map((p,i)=>`<tr>
    <td><input value="${esc(p.key)}" onchange="params[${i}].key=this.value"></td>
    <td><input value="${esc(p.value)}" onchange="params[${i}].value=this.value"></td>
    <td><button class="btn btn-danger btn-sm" onclick="params.splice(${i},1);renderParams()">删除</button></td>
  </tr>`).join('');
}

function addParam(){
  const k=document.getElementById('newParamKey').value.trim();
  const v=document.getElementById('newParamVal').value.trim();
  if(!k){showToast('请输入参数名','error');return;}
  params.push({key:k,value:v});
  renderParams();
  document.getElementById('newParamKey').value='';
  document.getElementById('newParamVal').value='';
}

function buildUrl(){
  if(!parsedUrl){showToast('请先解析URL','error');return;}
  const base=parsedUrl.origin+parsedUrl.pathname;
  const qs=params.filter(p=>p.key).map(p=>encodeURIComponent(p.key)+'='+encodeURIComponent(p.value)).join('&');
  const hash=parsedUrl.hash||'';
  const result=qs?base+'?'+qs+hash:base+hash;
  document.getElementById('builtUrl').value=result;
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function copyResult(id){
  const el=document.getElementById(id);
  if(!el.value){showToast('没有内容可复制','error');return;}
  navigator.clipboard.writeText(el.value).then(()=>showToast('已复制到剪贴板'));
}

function showToast(msg,type){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.style.background=type==='error'?'var(--error)':'var(--success)';
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}
</script>
