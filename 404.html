  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-primary: #0f0f23;
      --bg-secondary: #1a1a3e;
      --accent-blue: #3a7bd5;
      --accent-cyan: #00d2ff;
      --accent-green: #00d4aa;
      --accent-purple: #818CF8;
      --text-primary: #f0f0f5;
      --text-secondary: #a0a0b8;
      --text-muted: #6c6c80;
      --card-bg: rgba(255, 255, 255, 0.04);
      --card-border: rgba(255, 255, 255, 0.08);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(160deg, var(--bg-primary) 0%, var(--bg-secondary) 50%, #12122a 100%);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem;
    }

    /* 404 动画 */
    .not-found-hero {
      text-align: center;
      margin-top: 5vh;
      margin-bottom: 1.5rem;
    }

    .not-found-hero h1 {
      font-size: clamp(5rem, 15vw, 10rem);
      font-weight: 900;
      background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue), var(--accent-green));
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: gradientShift 4s ease infinite, float 3s ease-in-out infinite;
      line-height: 1;
    }

    .not-found-hero .subtitle {
      font-size: 1.4rem;
      color: var(--text-secondary);
      margin-top: 0.5rem;
      font-weight: 500;
    }

    .not-found-hero .hint {
      font-size: 0.95rem;
      color: var(--text-muted);
      margin-top: 0.6rem;
    }

    .not-found-hero .emoji {
      font-size: 3rem;
      display: inline-block;
      animation: bounce 2s ease infinite;
    }

    @keyframes gradientShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      25% { transform: translateY(-8px) rotate(-5deg); }
      75% { transform: translateY(-4px) rotate(5deg); }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(58, 123, 213, 0.3); }
      50% { box-shadow: 0 0 0 8px rgba(58, 123, 213, 0); }
    }

    /* 搜索框 */
    .search-wrap {
      width: 100%;
      max-width: 520px;
      margin-bottom: 2.5rem;
      position: relative;
      animation: fadeInUp 0.5s ease 0.2s both;
    }

    .search-wrap .search-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1.1rem;
      pointer-events: none;
      opacity: 0.5;
    }

    .search-wrap input {
      width: 100%;
      padding: 0.9rem 1.2rem 0.9rem 2.8rem;
      font-size: 1rem;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 14px;
      color: var(--text-primary);
      outline: none;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    .search-wrap input::placeholder { color: var(--text-muted); }

    .search-wrap input:focus {
      border-color: var(--accent-blue);
      box-shadow: 0 0 0 3px rgba(58, 123, 213, 0.2);
    }

    /* 热门工具标题 */
    .section-title {
      width: 100%;
      max-width: 720px;
      text-align: center;
      font-size: 1.1rem;
      color: var(--text-secondary);
      margin-bottom: 1.2rem;
      animation: fadeInUp 0.5s ease 0.25s both;
    }

    .section-title span {
      color: var(--accent-cyan);
      font-weight: 600;
    }

    /* 产品卡片网格 */
    .products-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      width: 100%;
      max-width: 720px;
      animation: fadeInUp 0.5s ease 0.3s both;
    }

    .product-link {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 1.5rem 1rem;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      text-decoration: none;
      color: var(--text-primary);
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
    }

    .product-link:hover {
      transform: translateY(-4px);
      border-color: var(--accent-blue);
      box-shadow: 0 8px 30px rgba(58, 123, 213, 0.25);
      background: rgba(255, 255, 255, 0.07);
    }

    .product-link .p-emoji {
      font-size: 2.2rem;
      margin-bottom: 0.6rem;
      display: block;
    }

    .product-link .p-name {
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 0.3rem;
    }

    .product-link .p-desc {
      font-size: 0.78rem;
      color: var(--text-secondary);
      line-height: 1.4;
    }

    .product-link.hidden { display: none; }

    /* 返回首页按钮 */
    .btn-home {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 2.5rem;
      padding: 0.85rem 2.4rem;
      background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 50px;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.3s ease;
      animation: fadeInUp 0.5s ease 0.4s both;
    }

    .btn-home:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(58, 123, 213, 0.4);
    }

    .btn-home .arrow { font-size: 1.2rem; }

    footer {
      margin-top: auto;
      padding-top: 3rem;
      color: var(--text-muted);
      font-size: 0.8rem;
    }

    @media (max-width: 640px) {
      .products-grid { grid-template-columns: repeat(2, 1fr); }
      .not-found-hero { margin-top: 3vh; }
      .product-link { padding: 1.2rem 0.8rem; }
    }

    @media (max-width: 400px) {
      .products-grid { grid-template-columns: 1fr; }
    }
  </style>

  <script>
    (function () {
      var input = document.getElementById('search');
      var links = document.querySelectorAll('.product-link');

      input.addEventListener('input', function () {
        var q = this.value.trim().toLowerCase();
        links.forEach(function (el) {
          var name = el.querySelector('.p-name').textContent.toLowerCase();
          var desc = el.querySelector('.p-desc').textContent.toLowerCase();
          el.classList.toggle('hidden', q.length > 0 && name.indexOf(q) === -1 && desc.indexOf(q) === -1);
        });
      });
    })();
  </script>
