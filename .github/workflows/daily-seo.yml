name: Daily SEO Automation

on:
  schedule:
    # 0:00 UTC = 8:00 AM Beijing Time (CST/UTC+8)
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-blog-article:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install openai

      - name: Generate blog article
        env:
          DEEPSEEK_API_KEY: "sk-9b6810e1429747e3ac6f4975926aaec6"
        run: python .github/scripts/generate-article.py

      - name: Update sitemap
        run: python .github/scripts/update-sitemap.py

      - name: Commit and push new content
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "📭 No new content to commit."
          else
            git commit -m "feat: auto-generate daily blog article [skip ci]"
            git push
            echo "📬 New blog article committed and pushed."
          fi
