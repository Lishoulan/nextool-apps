                            <option value="jpeg">转换为 JPG</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Results -->
            <div class="card" id="resultsCard" style="display:none;">
                <div class="actions-bar">
                    <div class="total-savings">
                        总计节省：<strong id="totalSavings">0 KB</strong>
                    </div>
                    <div style="display:flex;gap:10px;flex-wrap:wrap;">
                        <button class="btn btn-primary" id="downloadAllZip">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                            打包下载 ZIP
                        </button>
                        <button class="btn btn-danger btn-sm" id="clearAll">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                            清空全部
                        </button>
                    </div>
                </div>
                <div class="image-list" id="imageList"></div>
            </div>
        </main>

        <footer>
            <p>&copy; 2024 <a href="/">NextTool</a> — 免费在线工具集，本地处理保护您的隐私</p>
        </footer>
    </div>

    <!-- Preview Modal -->
    <div class="modal-overlay" id="previewModal">
        <div class="modal">
            <div class="modal-header">
                <h2 id="previewTitle">图片预览</h2>
                <button class="modal-close" id="closePreview">&times;</button>
            </div>
            <div class="preview-container">
                <div class="preview-panel">
                    <p class="preview-label">原图</p>
                    <img class="preview-img" id="previewOriginal" alt="原图预览">
                    <p style="margin-top:8px;font-size:0.85rem;color:var(--text-muted)" id="previewOriginalSize"></p>
                </div>
                <div class="preview-panel">
                    <p class="preview-label">压缩后</p>
                    <img class="preview-img" id="previewCompressed" alt="压缩后预览">
                    <p style="margin-top:8px;font-size:0.85rem;color:var(--success)" id="previewCompressedSize"></p>
                </div>
            </div>
        </div>
    </div>

    <script>
    (function() {
        'use strict';

        const MAX_FILES = 10;
        const ALLOWED_TYPES = ['image/jpeg', 'image/png', 'image/webp'];

        let images = [];

        // DOM
        const uploadZone = document.getElementById('uploadZone');
        const fileInput = document.getElementById('fileInput');
        const qualitySlider = document.getElementById('qualitySlider');
        const qualityValue = document.getElementById('qualityValue');
        const maxWidthInput = document.getElementById('maxWidth');
        const maxHeightInput = document.getElementById('maxHeight');
        const outputFormat = document.getElementById('outputFormat');
        const resultsCard = document.getElementById('resultsCard');
        const imageList = document.getElementById('imageList');
        const totalSavingsEl = document.getElementById('totalSavings');
        const downloadAllBtn = document.getElementById('downloadAllZip');
        const clearAllBtn = document.getElementById('clearAll');
        const previewModal = document.getElementById('previewModal');
        const closePreview = document.getElementById('closePreview');
        const previewOriginal = document.getElementById('previewOriginal');
        const previewCompressed = document.getElementById('previewCompressed');
        const previewTitle = document.getElementById('previewTitle');
        const previewOriginalSize = document.getElementById('previewOriginalSize');
        const previewCompressedSize = document.getElementById('previewCompressedSize');

        // Quality slider
        qualitySlider.addEventListener('input', function() {
            qualityValue.textContent = this.value;
            reprocessAll();
        });

        maxWidthInput.addEventListener('change', reprocessAll);
        maxHeightInput.addEventListener('change', reprocessAll);
        outputFormat.addEventListener('change', reprocessAll);

        // Drag & Drop
        uploadZone.addEventListener('dragover', function(e) {
            e.preventDefault();
            this.classList.add('drag-over');
        });

        uploadZone.addEventListener('dragleave', function() {
            this.classList.remove('drag-over');
        });

        uploadZone.addEventListener('drop', function(e) {
            e.preventDefault();
            this.classList.remove('drag-over');
            handleFiles(e.dataTransfer.files);
        });

        fileInput.addEventListener('change', function() {
            handleFiles(this.files);
            this.value = '';
        });

        function handleFiles(fileList) {
            const files = Array.from(fileList).filter(f => ALLOWED_TYPES.includes(f.type));
            if (images.length + files.length > MAX_FILES) {
                alert('最多只能上传 ' + MAX_FILES + ' 张图片');
                files.splice(MAX_FILES - images.length);
            }
            if (files.length === 0) return;

            files.forEach(file => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.onload = function() {
                        const item = {
                            id: Date.now() + Math.random(),
                            file: file,
                            originalUrl: e.target.result,
                            img: img,
                            originalWidth: img.naturalWidth,
                            originalHeight: img.naturalHeight,
                            originalSize: file.size,
                            compressedBlob: null,
                            compressedUrl: null,
                            compressedSize: 0,
                            processing: false
                        };
                        images.push(item);
                        processImage(item);
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        function getOutputMime(format, originalType) {
            if (format === 'webp') return 'image/webp';
            if (format === 'jpeg') return 'image/jpeg';
            return originalType;
        }

        function getOutputExt(mime) {
            if (mime === 'image/webp') return '.webp';
            if (mime === 'image/jpeg') return '.jpg';
            if (mime === 'image/png') return '.png';
            return '.jpg';
        }

        function processImage(item) {
            item.processing = true;
            renderList();

            const quality = parseInt(qualitySlider.value) / 100;
            const maxW = parseInt(maxWidthInput.value) || 0;
            const maxH = parseInt(maxHeightInput.value) || 0;
            const format = outputFormat.value;
            const mime = getOutputMime(format, item.file.type);

            let w = item.originalWidth;
            let h = item.originalHeight;

            if (maxW > 0 && w > maxW) {
                h = Math.round(h * (maxW / w));
                w = maxW;
            }
            if (maxH > 0 && h > maxH) {
                w = Math.round(w * (maxH / h));
                h = maxH;
            }

            const canvas = document.createElement('canvas');
            canvas.width = w;
            canvas.height = h;
            const ctx = canvas.getContext('2d');

            // For JPEG, fill white background (no alpha)
            if (mime === 'image/jpeg') {
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, w, h);
            }

            ctx.drawImage(item.img, 0, 0, w, h);

            canvas.toBlob(function(blob) {
                if (item.compressedUrl) {
                    URL.revokeObjectURL(item.compressedUrl);
                }
                item.compressedBlob = blob;
                item.compressedUrl = URL.createObjectURL(blob);
                item.compressedSize = blob ? blob.size : 0;
                item.processing = false;
                renderList();
            }, mime, quality);
        }

        function reprocessAll() {
            images.forEach(item => processImage(item));
        }

        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
        }

        function getSavingsClass(pct) {
            if (pct >= 40) return 'savings-good';
            if (pct >= 10) return 'savings-ok';
            return 'savings-bad';
        }

        function renderList() {
            if (images.length === 0) {
                resultsCard.style.display = 'none';
                return;
            }
            resultsCard.style.display = 'block';

            let totalOriginal = 0;
            let totalCompressed = 0;

            imageList.innerHTML = images.map((item, idx) => {
                totalOriginal += item.originalSize;
                totalCompressed += item.compressedSize;

                const savings = item.originalSize > 0
                    ? Math.round((1 - item.compressedSize / item.originalSize) * 100)
                    : 0;

                const mime = item.compressedBlob ? item.compressedBlob.type : item.file.type;
                const ext = getOutputExt(mime);
                const baseName = item.file.name.replace(/\.[^.]+$/, '');
                const downloadName = baseName + ext;

                return `
                    <div class="image-item" data-id="${item.id}">
                        <img class="image-thumb" src="${item.originalUrl}" alt="${item.file.name}" data-idx="${idx}" onclick="window._previewImage(${idx})">
                        <div class="image-info">
                            <div class="image-name" title="${item.file.name}">${item.file.name}</div>
                            ${item.processing ? `
                                <div class="processing-text"><span class="spinner"></span> 压缩中...</div>
                            ` : `
                                <div class="image-sizes">
                                    <span class="size-original">${formatSize(item.originalSize)}</span>
                                    <span class="size-arrow">→</span>
                                    <span class="size-compressed">${formatSize(item.compressedSize)}</span>
                                    <span class="savings-badge ${getSavingsClass(savings)}">${savings > 0 ? '-' + savings + '%' : savings === 0 ? '0%' : '+' + Math.abs(savings) + '%'}</span>
                                </div>
                            `}
                        </div>
                        <div class="image-actions">
                            ${!item.processing && item.compressedBlob ? `
                                <button class="btn btn-primary btn-sm" onclick="window._downloadOne(${idx},'${downloadName}')">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                                    下载
                                </button>
                            ` : ''}
                            <button class="btn btn-danger btn-sm" onclick="window._removeImage(${idx})">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                            </button>
                        </div>
                    </div>
                `;
            }).join('');

            const totalSaved = totalOriginal - totalCompressed;
            const totalPct = totalOriginal > 0 ? Math.round((totalSaved / totalOriginal) * 100) : 0;
            totalSavingsEl.textContent = formatSize(totalSaved) + ' (' + totalPct + '%)';
        }

        // Download one
        window._downloadOne = function(idx, filename) {
            const item = images[idx];
            if (!item || !item.compressedBlob) return;
            const a = document.createElement('a');
            a.href = item.compressedUrl;
            a.download = filename;
            a.click();
        };

        // Remove
        window._removeImage = function(idx) {
            const item = images[idx];
            if (item && item.compressedUrl) {
                URL.revokeObjectURL(item.compressedUrl);
            }
            images.splice(idx, 1);
            renderList();
        };

        // Preview
        window._previewImage = function(idx) {
            const item = images[idx];
            if (!item) return;
            previewTitle.textContent = item.file.name;
            previewOriginal.src = item.originalUrl;
            previewOriginalSize.textContent = '原始大小：' + formatSize(item.originalSize) + ' (' + item.originalWidth + ' × ' + item.originalHeight + ')';
            if (item.compressedUrl) {
                previewCompressed.src = item.compressedUrl;
                previewCompressedSize.textContent = '压缩后：' + formatSize(item.compressedSize) + (item.compressedBlob ? ' (' + (item.compressedBlob.type === 'image/webp' ? 'WebP' : item.compressedBlob.type === 'image/jpeg' ? 'JPG' : 'PNG') + ')' : '');
            } else {
                previewCompressed.src = '';
                previewCompressedSize.textContent = '压缩中...';
            }
            previewModal.classList.add('active');
        };

        closePreview.addEventListener('click', function() {
            previewModal.classList.remove('active');
        });

        previewModal.addEventListener('click', function(e) {
            if (e.target === previewModal) {
                previewModal.classList.remove('active');
            }
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') previewModal.classList.remove('active');
        });

        // Download all as ZIP
        downloadAllBtn.addEventListener('click', function() {
            if (images.length === 0) return;
            const zip = new JSZip();
            images.forEach((item, idx) => {
                if (item.compressedBlob) {
                    const mime = item.compressedBlob.type;
                    const ext = getOutputExt(mime);
                    const baseName = item.file.name.replace(/\.[^.]+$/, '');
                    zip.file(baseName + ext, item.compressedBlob);
                }
            });
            zip.generateAsync({ type: 'blob' }).then(function(content) {
                const a = document.createElement('a');
                a.href = URL.createObjectURL(content);
                a.download = 'compressed-images.zip';
                a.click();
                URL.revokeObjectURL(a.href);
            });
        });

        // Clear all
        clearAllBtn.addEventListener('click', function() {
            images.forEach(item => {
                if (item.compressedUrl) URL.revokeObjectURL(item.compressedUrl);
            });
            images = [];
            renderList();
        });

    })();
    </script>
